name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        run: |
          x86_64-w64-mingw32-windres --codepage=65001 idv_multi_launcher.rc --output-format=coff -o idv_multi_launcher.res
          x86_64-w64-mingw32-g++ idv_multi_launcher.cpp idv_multi_launcher.res -o idv_multi_launcher.exe -static -mwindows -lpsapi -ladvapi32 -lcomctl32 -finput-charset=UTF-8 -fexec-charset=UTF-8

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: idv_multi_launcher
          path: idv_multi_launcher.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: idv_multi_launcher.exe
          body: |
            使用本工具多开游戏可能违反《第五人格》用户协议，存在**封号风险**。使用者需自行承担一切后果。
            
            详细使用方法请查看 [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
