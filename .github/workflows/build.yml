name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: idv_multi_launcher
          path: idv_multi_launcher.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: idv_multi_launcher.exe
          body: |
            ## ⚠️ 免责声明
            使用本工具多开游戏可能违反《第五人格》用户协议，存在**封号风险**。使用者需自行承担一切后果。

            ## 下载说明
            下载 `idv_multi_launcher.exe` 后直接运行即可。

            详细使用方法请查看 [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
